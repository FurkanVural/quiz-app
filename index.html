<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css"
      integrity="sha512-2bBQCjcnw658Lho4nlXJcc6WkV/UxpE/sAokbXPxQNGqmNdQrWqtw26Ns9kFF/yG792pKR1Sx8/Y1Lf1XN4GKA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <title>Quiz-App</title>
  </head>
  <body
    style="
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    "
  >
    <button id="btn-start" class="d-block">Start Quiz</button>
    <div id="quiz-box" class="d-none">
      <div id="header">
        <h2 id="header-title">Quiz App</h2>
        <div id="time-box">
          <h5 id="time-title">Süre Bitti</h5>
          <div id="timer"></div>
        </div>
        <div class="time-flow"></div>
      </div>
      <div id="question-box"></div>
      <div id="footer">
        <span class="badge text-bg-danger soru-sayisi">1 / 4</span>
        <button class="btn-next d-none">
          <i id="" class="bi bi-arrow-right"></i>
        </button>
      </div>
    </div>
    <div class="score-table d-none border-primary">
      <i class="bi bi-award-fill text-primary"></i>
      <div class="score-point"></div>
      <div id="score-buttons" class="">
        
        <button class="btn btn-primary btn-replay">Replay</button>
        <button class="btn btn-primary btn-quit">Quit</button>
      </div>
    </div>

    <script src="js/soru.js"></script>
    <script src="js/quiz.js"></script>
    <script src="js/ui.js"></script>

    <script src="js/app.js"></script>
  </body>
</html>
